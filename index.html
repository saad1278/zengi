<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zengi Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 id="site-title">Zengi Store</h1>
        <button id="translate-btn" onclick="translatePage()">Arabic</button>
    </header>

    <section class="products">
        <div class="product-card" onclick="openProductPage('product1.html')">
            <img src="product1.jpg" alt="Product 1">
            <h2>Product 1</h2>
            <p>$10</p>
        </div>
        <div class="product-card" onclick="openProductPage('product2.html')">
            <img src="product2.jpg" alt="Product 2">
            <h2>Product 2</h2>
            <p>$15</p>
        </div>
        <div class="product-card" onclick="openProductPage('product3.html')">
            <img src="product3.jpg" alt="Product 3">
            <h2>Product 3</h2>
            <p>$13.5</p>
        </div>
        <div class="product-card" onclick="openProductPage('product4.html')">
            <img src="product4.jpg" alt="Product 4">
            <h2>Product 4</h2>
            <p>$11</p>
        </div>
        <div class="product-card" onclick="openProductPage('product5.html')">
            <img src="product5.jpg" alt="Product 5">
            <h2>Product 5</h2>
            <p>$12</p>
        </div>
        <div class="product-card" onclick="openProductPage('product6.html')">
            <img src="product6.jpg" alt="Product 6">
            <h2>Product 6</h2>
            <p>$10.5</p>
        </div>
    </section>

    <footer>
        <p>Made by Saad</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
